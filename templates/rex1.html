<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>REX1 Story</title>

  <link rel="stylesheet" href="/rex1/style.css">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0f;
      font-family: Arial, sans-serif;
      color: white;
    }

    #bg {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      top: -50px;
      animation: fall linear forwards;
      opacity: 0.8;
      user-select: none;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }

    #container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      position: absolute;
      opacity: 0;
      transform: scale(0.98);
      transition: 0.5s ease;
      text-align: center;
      max-width: 80%;
    }

    .card.active {
      opacity: 1;
      transform: scale(1);
    }

    .card img {
      width: 260px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .text {
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<!-- 💖 BACKGROUND -->
<div id="bg"></div>

<!-- 📖 STORY -->
<div id="container"></div>

<!-- 🎵 MUSIC -->
<audio id="bgm" src="/rex1/sempurna.mp3"></audio>

<!-- JS -->
<script src="/rex1/script.js"></script>

</body>
</html>
