<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>REX1</title>

  <link rel="stylesheet" href="/rex1/style.css">

  <style>
    /* fallback biar langsung jalan kalau css belum diisi */
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0f;
      font-family: sans-serif;
      color: white;
    }

    #bg {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      top: -50px;
      animation: fall linear forwards;
      opacity: 0.8;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }

    #container {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      position: absolute;
      opacity: 0;
      transition: 0.6s ease;
      text-align: center;
      max-width: 80%;
    }

    .card.active {
      opacity: 1;
      transform: scale(1.02);
    }

    .card img {
      width: 260px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .text {
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    #end {
      position: fixed;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      background: rgba(0,0,0,0.6);
      z-index: 999;
    }
  </style>
</head>

<body>

<!-- 💖 BACKGROUND LOVE -->
<div id="bg"></div>

<!-- 📖 STORY -->
<div id="container"></div>

<!-- 🌙 END SCREEN -->
<div id="end">
  <h1>the end 💖</h1>
</div>

<!-- 🎵 MUSIC (OPSIONAL) -->
